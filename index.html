<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="data:,">
    <title>Mcdo</title>
    <style>
      :root {
        color-scheme: light;
        --mcdo-red: #c8102e;
        --mcdo-yellow: #ffc72c;
        --text: #29220f;
        --page: #fffaf0;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 2rem;
        background: linear-gradient(var(--mcdo-red), var(--mcdo-red)) top / 100% 0.5rem no-repeat,
          linear-gradient(var(--mcdo-yellow), var(--mcdo-yellow)) top 0.5rem left / 100% 0.25rem no-repeat,
          var(--page);
        color: var(--text);
        font-family: Arial, Helvetica, sans-serif;
        font-size: clamp(1.5rem, 4vw, 2.5rem);
        line-height: 1.2;
        text-align: center;
      }

      main {
        max-width: min(100%, 24rem);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>hello from mcdo</main>
  </body>
</html>
